<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סימולטור משקל במעלית</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .elevator-shaft {
            width: 300px;
            height: 400px;
            background: #e0e0e0;
            border: 3px solid #333;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .elevator {
            width: 280px;
            height: 120px;
            background: linear-gradient(180deg, #4a5568 0%, #2d3748 100%);
            border: 2px solid #1a202c;
            border-radius: 5px;
            position: absolute;
            left: 10px;
            top: 280px;
            transition: top 6s ease-in-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .person {
            width: 40px;
            height: 80px;
            margin: 20px auto 0;
            position: relative;
        }
        .head {
            width: 30px;
            height: 30px;
            background: #ffd5a3;
            border-radius: 50%;
            margin: 0 auto;
            border: 2px solid #333;
        }
        .body {
            width: 35px;
            height: 45px;
            background: #3498db;
            margin: 2px auto;
            border-radius: 5px;
            border: 2px solid #333;
        }
        .floor-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #000;
            color: #0f0;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            z-index: 10;
        }
        .cable {
            position: absolute;
            width: 4px;
            background: repeating-linear-gradient(
                0deg,
                #555 0px,
                #555 8px,
                #777 8px,
                #777 16px
            );
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            height: 280px;
            transition: height 6s ease-in-out;
            border-radius: 2px;
        }
        .scale {
            width: 60px;
            height: 10px;
            background: #555;
            margin: 0 auto;
            border-radius: 3px;
            position: relative;
        }
        .scale::after {
            content: '';
            width: 55px;
            height: 8px;
            background: #888;
            position: absolute;
            top: 1px;
            left: 2.5px;
            border-radius: 2px;
        }
        .weight-display {
            background: #1a202c;
            color: #4ade80;
            padding: 15px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .floor-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .floor-btn:hover {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .floor-btn:active {
            transform: translateY(0);
        }
        .floor-btn.current {
            background: #48bb78;
        }
        .status {
            margin-top: 15px;
            font-size: 18px;
            color: #666;
            font-weight: bold;
        }
        .emergency-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
        .emergency-btn:hover {
            background: #c53030;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,62,62,0.4);
        }
        .emergency-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 סימולטור משקל במעלית</h1>
        
        <div class="weight-display" id="weightDisplay">70.0 ק"ג</div>
        
        <div class="elevator-shaft">
            <div class="floor-indicator" id="floorIndicator">1</div>
            <div class="cable" id="cable"></div>
            <div class="elevator" id="elevator">
                <div class="person">
                    <div class="head"></div>
                    <div class="body"></div>
                    <div class="scale"></div>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">המעלית במנוחה</div>
        
        <div class="controls">
            <button class="floor-btn" onclick="goToFloor(5)">5</button>
            <button class="floor-btn" onclick="goToFloor(4)">4</button>
            <button class="floor-btn" onclick="goToFloor(3)">3</button>
            <button class="floor-btn" onclick="goToFloor(2)">2</button>
            <button class="floor-btn current" onclick="goToFloor(1)">1</button>
            <button class="floor-btn" onclick="goToFloor(0)">0</button>
        </div>
        
        <button class="emergency-btn" id="emergencyBtn" onclick="cutCable()">
            ⚠️ נתק כבל (נפילה חופשית!)
        </button>
    </div>

    <script>
        const REAL_WEIGHT = 70; // משקל אמיתי בק"ג
        const GRAVITY = 9.8; // תאוצת כובד
        let currentFloor = 1;
        let isMoving = false;
        let isFalling = false;
        
        function updateCableHeight() {
            const elevator = document.getElementById('elevator');
            const cable = document.getElementById('cable');
            const elevatorTop = parseFloat(elevator.style.top || '280');
            cable.style.height = elevatorTop + 'px';
        }
        
        function updateWeight(acceleration) {
            // משקל נמדד = משקל אמיתי × (1 + תאוצה/כובד)
            const apparentWeight = REAL_WEIGHT * (1 + acceleration / GRAVITY);
            document.getElementById('weightDisplay').textContent = apparentWeight.toFixed(1) + ' ק"ג';
        }
        
        function goToFloor(targetFloor) {
            if (isMoving || targetFloor === currentFloor || isFalling) return;
            
            isMoving = true;
            const elevator = document.getElementById('elevator');
            const floorIndicator = document.getElementById('floorIndicator');
            const status = document.getElementById('status');
            
            // עדכון כפתורים
            document.querySelectorAll('.floor-btn').forEach(btn => btn.classList.remove('current'));
            event.target.classList.add('current');
            
            const direction = targetFloor > currentFloor ? 'up' : 'down';
            const floors = Math.abs(targetFloor - currentFloor);
            
            // מיקום המעלית (כל קומה = 70px)
            const startPos = (5 - currentFloor) * 70;
            const endPos = (5 - targetFloor) * 70;
            
            // שלב 1: האצה
            status.textContent = direction === 'up' ? '↑ עולה' : '↓ יורדת';
            const acceleration = direction === 'up' ? 2 : -2; // m/s²
            updateWeight(acceleration);
            
            setTimeout(() => {
                // שלב 2: תנועה במהירות קבועה
                updateWeight(0);
                elevator.style.top = endPos + 'px';
                updateCableHeight();
                
                // עדכון קומה במהלך הנסיעה
                const interval = setInterval(() => {
                    if (direction === 'up' && currentFloor < targetFloor) {
                        currentFloor++;
                        floorIndicator.textContent = currentFloor;
                    } else if (direction === 'down' && currentFloor > targetFloor) {
                        currentFloor--;
                        floorIndicator.textContent = currentFloor;
                    } else {
                        clearInterval(interval);
                    }
                }, 6000 / floors);
                
            }, 1500);
            
            // שלב 3: האטה
            setTimeout(() => {
                const deceleration = direction === 'up' ? -2 : 2; // m/s²
                updateWeight(deceleration);
            }, 4500);
            
            // שלב 4: עצירה
            setTimeout(() => {
                updateWeight(0);
                currentFloor = targetFloor;
                floorIndicator.textContent = currentFloor;
                status.textContent = 'המעלית במנוחה';
                isMoving = false;
            }, 6000);
        }
        
        function cutCable() {
            if (isFalling || isMoving) return;
            
            isFalling = true;
            const elevator = document.getElementById('elevator');
            const cable = document.getElementById('cable');
            const status = document.getElementById('status');
            const emergencyBtn = document.getElementById('emergencyBtn');
            
            emergencyBtn.disabled = true;
            cable.style.display = 'none';
            status.textContent = '🚨 נפילה חופשית!!!';
            
            // בנפילה חופשית המשקל הוא 0!
            updateWeight(-GRAVITY);
            
            // אנימציית נפילה מהירה
            elevator.style.transition = 'top 1.5s cubic-bezier(0.5, 0, 1, 1)';
            elevator.style.top = '330px'; // נפילה לתחתית
            
            setTimeout(() => {
                status.textContent = '💥 התרסקות!';
                elevator.style.background = 'linear-gradient(180deg, #742a2a 0%, #5a1a1a 100%)';
                
                setTimeout(() => {
                    // איפוס
                    status.textContent = 'איפוס מעלית...';
                    setTimeout(() => {
                        elevator.style.transition = 'top 6s ease-in-out';
                        elevator.style.top = '280px';
                        elevator.style.background = 'linear-gradient(180deg, #4a5568 0%, #2d3748 100%)';
                        cable.style.display = 'block';
                        cable.style.height = '280px';
                        currentFloor = 1;
                        document.getElementById('floorIndicator').textContent = '1';
                        updateWeight(0);
                        status.textContent = 'המעלית במנוחה';
                        isFalling = false;
                        emergencyBtn.disabled = false;
                        
                        document.querySelectorAll('.floor-btn').forEach(btn => btn.classList.remove('current'));
                        document.querySelectorAll('.floor-btn')[4].classList.add('current');
                    }, 1000);
                }, 2000);
            }, 1500);
        }
        
        // אתחול
        updateWeight(0);
        updateCableHeight();
    </script>
</body>
</html>
