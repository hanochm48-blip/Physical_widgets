<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחשבון</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f3ede1;color:#211d18;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
  .back{position:fixed;top:18px;right:18px;text-decoration:none;color:#8a3d1d;font-weight:600}
  h1{font-size:1.5rem}
  .calc{background:#fbf7ee;border:1.5px solid #d9cdb6;border-radius:20px;padding:18px;width:300px;box-shadow:0 16px 34px -18px rgba(60,45,25,.3)}
  #screen{width:100%;height:64px;border:none;background:#211d18;color:#f3ede1;border-radius:12px;
    text-align:left;font-size:1.8rem;padding:0 16px;margin-bottom:14px;direction:ltr}
  .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  button{border:none;border-radius:12px;padding:16px 0;font-size:1.15rem;cursor:pointer;background:#ece3d2;transition:.15s}
  button:hover{transform:translateY(-2px)}
  .op{background:#b5532a;color:#fff}
  .eq{background:#211d18;color:#fff}
  .span2{grid-column:span 2}
</style>
</head>
<body>
<a class="back" href="../index.html">→ חזרה לאינדקס</a>
<h1>מחשבון</h1>
<div class="calc">
  <input id="screen" value="0" readonly>
  <div class="keys">
    <button onclick="clr()">C</button>
    <button onclick="del()">⌫</button>
    <button class="op" onclick="ins('%')">%</button>
    <button class="op" onclick="ins('/')">÷</button>
    <button onclick="ins('7')">7</button><button onclick="ins('8')">8</button><button onclick="ins('9')">9</button>
    <button class="op" onclick="ins('*')">×</button>
    <button onclick="ins('4')">4</button><button onclick="ins('5')">5</button><button onclick="ins('6')">6</button>
    <button class="op" onclick="ins('-')">−</button>
    <button onclick="ins('1')">1</button><button onclick="ins('2')">2</button><button onclick="ins('3')">3</button>
    <button class="op" onclick="ins('+')">+</button>
    <button class="span2" onclick="ins('0')">0</button>
    <button onclick="ins('.')">.</button>
    <button class="eq" onclick="calc()">=</button>
  </div>
</div>
<script>
  const s=document.getElementById('screen');let expr='';
  function show(){s.value=expr||'0';}
  function ins(c){if(expr==='0'&&/[0-9.]/.test(c))expr='';expr+=c.replace('×','*').replace('÷','/');show();}
  function clr(){expr='';show();}
  function del(){expr=expr.slice(0,-1);show();}
  function calc(){try{const r=Function('"use strict";return('+expr.replace(/%/g,'/100')+')')();expr=String(Math.round(r*1e10)/1e10);}catch{expr='שגיאה';}show();}
</script>
</body>
</html>
